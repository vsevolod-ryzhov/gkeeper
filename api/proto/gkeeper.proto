edition = "2023";

package vsevolodryzhov.gkeeper.proto;

option go_package = "github.com/vsevolod-ryzhov/gkeeper.git/api/proto";

service GKeeper {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc CreateSecret(CreateSecretRequest) returns (CreateSecretResponse);
  rpc UpdateSecret(UpdateSecretRequest) returns (UpdateSecretResponse);
  rpc GetSecrets(GetSecretsRequest) returns (GetSecretsResponse);
  rpc GetSecret(GetSecretRequest) returns (GetSecretResponse);
  rpc DeleteSecret(DeleteSecretRequest) returns (DeleteSecretResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
}

message RegisterResponse {
  string result = 1;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
  string salt = 2;
  string user_id = 3;
  string email = 4;
}

message CreateSecretRequest {
  string token = 1;
  string title = 2;
  string type = 3;
  bytes encrypted_data = 4;
  string metadata = 5;
  string file_path = 6;
}

message CreateSecretResponse {
  string id = 1;
  string created_at = 2;
}

message UpdateSecretRequest {
  string token = 1;
  string id = 2;
  string title = 3;
  string type = 4;
  bytes encrypted_data = 5;
  string metadata = 6;
  string file_path = 7;
}

message UpdateSecretResponse {
  string updated_at = 1;
}

message GetSecretsRequest {
  string token = 1;
}

message GetSecretsResponse {
  repeated Secret secrets = 1;
}

message GetSecretRequest {
  string token = 1;
  string id = 2;
}

message GetSecretResponse {
  Secret secret = 1;
}

message DeleteSecretRequest {
  string token = 1;
  string id = 2;
}

message DeleteSecretResponse {
  bool success = 1;
  string deleted_at = 2;
}

message Secret {
  string id = 1;
  string user_id = 2;
  string title = 3;
  string type = 4;
  bytes encrypted_data = 5;
  string metadata = 6;
  string file_path = 7;
  string created_at = 8;
  string updated_at = 9;
  string deleted_at = 10;
}
